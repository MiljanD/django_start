
<div>
    <form method="POST" action="/logout/">
    {% csrf_token %}
    <button type="submit">Logout</button>
    </form>

    {% for product in all %}
        <h2>{{ product.title }}</h2>
            <ul>
               <li><p>${{ product.price }}</p></li>
               <li><p>{{ product.description }}</p></li>
            </ul>
    {% endfor %}
</div>
