{% extends "layout.html" %}

{% block title %}
    Glavna Stranica
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        {% for product in all %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                <a href="{% url 'product_page' product.title %}">
                    <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.title }}">
                </a>
                <div class="card-body">
                    <h5 class="card-title">{{ product.title }}</h5>
                    <p class="card-text">
                        Cena: ${{ product.promoted_price|default:product.price }}
                    </p>
                    <p class="card-text text-muted">{{ product.description }}</p>
                </div>
                <div class="card-footer text-center">
                    <a href="{% url 'product_page' product.title %}" class="btn btn-primary">Detalji</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
